<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7CFC00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8FBC8F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#556B2F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background field -->
  <rect x="0" y="40" width="120" height="40" fill="url(#fieldGradient)" />
  
  <!-- Sun -->
  <circle cx="100" cy="20" r="12" fill="url(#sunGradient)" />
  
  <!-- Sun rays -->
  <g stroke="url(#sunGradient)" stroke-width="1">
    <line x1="85" y1="20" x2="75" y2="20" />
    <line x1="115" y1="20" x2="125" y2="20" />
    <line x1="100" y1="5" x2="100" y2="-5" />
    <line x1="100" y1="35" x2="100" y2="45" />
    <line x1="89" y1="9" x2="82" y2="2" />
    <line x1="111" y1="31" x2="118" y2="38" />
    <line x1="89" y1="31" x2="82" y2="38" />
    <line x1="111" y1="9" x2="118" y2="2" />
  </g>
  
  <!-- Wheat field with waving effect -->
  <g fill="url(#leafGradient)">
    <!-- Row 1 -->
    <path d="M10 50 L12 45 L14 50 L12 47 Z" />
    <path d="M20 52 L22 47 L24 52 L22 49 Z" />
    <path d="M30 48 L32 43 L34 48 L32 45 Z" />
    <path d="M40 51 L42 46 L44 51 L42 48 Z" />
    <path d="M50 49 L52 44 L54 49 L52 46 Z" />
    <path d="M60 53 L62 48 L64 53 L62 50 Z" />
    <path d="M70 50 L72 45 L74 50 L72 47 Z" />
    <path d="M80 52 L82 47 L84 52 L82 49 Z" />
    <path d="M90 48 L92 43 L94 48 L92 45 Z" />
    <path d="M100 51 L102 46 L104 51 L102 48 Z" />
    <path d="M110 49 L112 44 L114 49 L112 46 Z" />
    
    <!-- Row 2 -->
    <path d="M15 58 L17 53 L19 58 L17 55 Z" />
    <path d="M25 60 L27 55 L29 60 L27 57 Z" />
    <path d="M35 56 L37 51 L39 56 L37 53 Z" />
    <path d="M45 59 L47 54 L49 59 L47 56 Z" />
    <path d="M55 57 L57 52 L59 57 L57 54 Z" />
    <path d="M65 61 L67 56 L69 61 L67 58 Z" />
    <path d="M75 58 L77 53 L79 58 L77 55 Z" />
    <path d="M85 60 L87 55 L89 60 L87 57 Z" />
    <path d="M95 56 L97 51 L99 56 L97 53 Z" />
    <path d="M105 59 L107 54 L109 59 L107 56 Z" />
  </g>
  
  <!-- Farmer character -->
  <g transform="translate(50, 35)">
    <!-- Head -->
    <circle cx="0" cy="0" r="5" fill="#F5DEB3" />
    
    <!-- Hat -->
    <ellipse cx="0" cy="-4" rx="7" ry="2" fill="#8B4513" />
    <rect x="-5" y="-6" width="10" height="3" fill="#8B4513" />
    
    <!-- Body -->
    <rect x="-4" y="5" width="8" height="12" fill="#4682B4" rx="2" />
    
    <!-- Arms -->
    <rect x="-8" y="7" width="4" height="2" fill="#F5DEB3" />
    <rect x="4" y="7" width="4" height="2" fill="#F5DEB3" />
    
    <!-- Tools -->
    <rect x="-10" y="5" width="2" height="10" fill="#8B4513" />
    <circle cx="-12" cy="6" r="2" fill="#A0522D" />
  </g>
  
  <!-- Text -->
  <text x="60" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2F4F4F">KrishiMitra</text>
</svg>